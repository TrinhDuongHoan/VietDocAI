name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vietdocai_deploy_key
          chmod 600 ~/.ssh/vietdocai_deploy_key

          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          test -n "$DEPLOY_PATH"
          test -n "$PRODUCTION_ENV_FILE"

          ssh -i ~/.ssh/vietdocai_deploy_key \
            -p "${VPS_PORT:-22}" \
            "$VPS_USER@$VPS_HOST" \
            "mkdir -p '$DEPLOY_PATH'"

          printf '%s\n' "$PRODUCTION_ENV_FILE" | ssh -i ~/.ssh/vietdocai_deploy_key \
            -p "${VPS_PORT:-22}" \
            "$VPS_USER@$VPS_HOST" \
            "cat > '$DEPLOY_PATH/.env.production' && chmod 600 '$DEPLOY_PATH/.env.production'"

          ssh -i ~/.ssh/vietdocai_deploy_key \
            -p "${VPS_PORT:-22}" \
            "$VPS_USER@$VPS_HOST" \
            "cd '$DEPLOY_PATH' && \
             git fetch --all --prune && \
             git checkout '$DEPLOY_REF' && \
             git pull --ff-only && \
             docker compose -f docker-compose.prod.yml --env-file .env.production config -q && \
             docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build && \
             docker compose -f docker-compose.prod.yml --env-file .env.production ps"
