name: vietdoc-ai

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    healthcheck:
      test:
        [
          "CMD",
          "rabbitmq-diagnostics",
          "-q",
          "ping"
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

    command:
      - uvicorn
      - app.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
      - --forwarded-allow-ips
      - "*"

    env_file:
      - .env.production

    ports:
      - "127.0.0.1:8000:8000"

    volumes:
      - ./data:/data
      - paddle_models_v2:/home/appuser/.paddlex
      - model_cache_v2:/home/appuser/.cache

    depends_on:
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8000/health/ready"
        ]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

    command:
      - celery
      - -A
      - app.worker.celery_app:celery_app
      - worker
      - --loglevel=INFO
      - --concurrency=1

    env_file:
      - .env.production

    environment:
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"

    volumes:
      - ./data:/data
      - paddle_models_v2:/home/appuser/.paddlex
      - model_cache_v2:/home/appuser/.cache

    shm_size: "1gb"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.worker.celery_app:celery_app inspect ping -d celery@$$HOSTNAME"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    depends_on:
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      dockerfile: Dockerfile

    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

    command:
      - alembic
      - upgrade
      - head

    env_file:
      - .env.production

    volumes:
      - ./data:/data

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
  paddle_models_v2:
  model_cache_v2:
